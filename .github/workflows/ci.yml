name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  format:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet fantomas --check .

  build:
    needs: format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore FSharp.Windows.Dsl.slnx

      - name: Build
        run: dotnet build FSharp.Windows.Dsl.slnx --no-restore

      - name: Test
        run: dotnet test FSharp.Windows.Dsl.slnx --no-build
