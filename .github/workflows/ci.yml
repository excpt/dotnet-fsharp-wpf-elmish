name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  format:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet fantomas --check .

  build:
    needs: format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          # Install all three SDKs so each net*-windows TFM has its matching runtime
          # pack (and apphost template) available locally — required for Exe outputs.
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore FSharp.Windows.Dsl.slnx

      - name: Build
        run: dotnet build FSharp.Windows.Dsl.slnx --no-restore

      - name: Test
        run: dotnet test FSharp.Windows.Dsl.slnx --no-build
